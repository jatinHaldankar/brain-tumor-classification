name: CD Pipeline (Deploy to Azure)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/brain-tumor-classifier
  AZURE_CONTAINER_APP_NAME: brain-tumor-app
  AZURE_RESOURCE_GROUP: brain-tumor-rg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up DVC
        uses: iterative/setup-dvc@v1

      - name: Pull Model using DVC
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user $MLFLOW_TRACKING_USERNAME
          dvc remote modify origin --local password $MLFLOW_TRACKING_PASSWORD
          dvc pull artifacts/training/model.h5 -r origin

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t $DOCKER_IMAGE_NAME:latest .
          docker push $DOCKER_IMAGE_NAME:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.DOCKER_IMAGE_NAME }}:latest
          containerAppName: ${{ env.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
